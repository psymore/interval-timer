<!DOCTYPE html>
<html lang="en">

<head>
    <!-- <meta http-equiv="Content-Security-Policy" content="default-src 'self';
           script-src 'self' https://www.youtube.com https://sdk.scdn.co;
           frame-src https://www.youtube.com;
           style-src 'self' 'unsafe-inline';
           font-src 'self';
           img-src 'self' data: https://i.ytimg.com;
           connect-src 'self' https://api.spotify.com;

           worker-src blob:"> -->

    <meta http-equiv="Content-Security-Policy" content="default-src 'self';
       script-src 'self' https://www.youtube.com https://s.ytimg.com https://sdk.scdn.co;
       frame-src 'self' https://www.youtube.com https://sdk.scdn.co https://*.spotify.com;
       style-src 'self' 'unsafe-inline';
       font-src 'self';
       img-src 'self' data: https://i.ytimg.com https://*.scdn.co;
       connect-src 'self' https://api.spotify.com https://*.spotify.com wss://*.spotify.com wss://*.api.spotify.com;
       media-src 'self' file: blob: data: https://p.scdn.co https://*.cdn.spotify.com;
       worker-src blob:">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timer App</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

    <h1 class="gradient-title">Timer App</h1>

    <div class="top-bar">
        <div class="tab-buttons">
            <button class="active" data-tab="interval">Interval Timer</button>
            <button data-tab="timer">Timer</button>
        </div>
        <div class="modal-buttons">
            <button id="settingsIcon" class="icon-btn" aria-label="Open settings">⚙️</button>
            <button id="alarmFolderBtn" class="icon-btn" aria-label="Choose alarm sound">🔔</button>
            <button id="alwaysOnTopBtn" class="icon-btn" aria-label="Pin window on top" aria-pressed="false">📍</button>

        </div>
    </div>

    <div id="app"></div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <div class="modal-content">
            <h2 id="settingsTitle">Alarm Settings</h2>
            <div id="timerSettings" class="settings-group hidden">
                <label for="timerAlarmLength">
                    Alarm Length (seconds)
                    <input type="number" id="timerAlarmLength" min="1" value="5" />
                </label>
            </div>
            <div id="intervalSettings" class="settings-group hidden">
                <label for="workAlarmLength">
                    Work Alarm (seconds)
                    <input type="number" id="workAlarmLength" min="1" value="5" />
                </label>
                <label for="breakAlarmLength">
                    Break Alarm (seconds)
                    <input type="number" id="breakAlarmLength" min="1" value="5" />
                </label>
            </div>
            <div class="button-group">
                <button id="saveSettingsBtn">Save</button>
                <button id="closeSettingsBtn">Close</button>
            </div>
        </div>
    </div>

    <!-- Alarm File Modal -->
    <div id="alarmFolderModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="alarmTitle">
        <div class="modal-content">
            <h2 id="alarmTitle">Alarm Sound</h2>

            <!-- Mevcut kaynak -->
            <div class="alarm-current">
                <span class="alarm-current-label">Current</span>
                <span class="alarm-current-file" id="alarmCurrentFile">alarm.mp3 (default)</span>
                <span class="alarm-provider-tag hidden" id="alarmProviderTag"></span>
            </div>

            <!-- Local dosya seçimi -->
            <div class="alarm-section">
                <p class="alarm-section-label">Local file</p>
                <button id="chooseAlarmBtn" class="btn-primary">Choose file…</button>
            </div>

            <!-- URL ile yükleme -->
            <div class="alarm-section">
                <p class="alarm-section-label">YouTube or Spotify URL</p>
                <div class="alarm-url-row">
                    <input id="alarmUrlInput" type="url" placeholder="https://youtube.com/watch?v=… or spotify link"
                        autocomplete="off" spellcheck="false" />
                    <button id="alarmUrlLoadBtn">Load</button>
                </div>
                <p class="alarm-url-hint">
                    Paste a YouTube video or Spotify track URL.
                    If unavailable, local alarm will be used as fallback.
                </p>
            </div>

            <!-- Preview -->
            <div class="alarm-actions">
                <button id="previewAlarmBtn" aria-label="Preview alarm sound">
                    ▶ Preview
                </button>
                <button id="closeAlarmFolderBtn" class="btn-subtle">Done</button>
            </div>

            <!-- Feedback -->
            <p class="alarm-feedback hidden" id="alarmFeedback"></p>
        </div>
    </div>

    <audio id="alarmSound" src="assets/alarm.mp3" preload="auto"></audio>

    <script type="module" src="js/renderer.js"></script>
    <script type="module" src="js/alarmModal.js"></script>

</body>

</html>
